on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: cd api && go test ./...
      - name: Build
        run: cd api && go build -o ../server ./cmd/server
      - name: Restart service
        run: sudo systemctl restart mirrorleague