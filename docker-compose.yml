services:
  db:
    image: postgres:17
    environment: 
      POSTGRES_USER: mirrorleague
      POSTGRES_PASSWORD: mirrorleague
      POSTGRES_DB: mirrorleague
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
  
volumes:
  pgdata: